<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wrap Studio</title>
  <link rel="stylesheet" href="/wrap-studio/studio.css" />
</head>
<body>
  <div id="ws-app"></div>

  <!--
    React + ReactDOM (UMD builds — no bundler required).
    Babel standalone is used to transpile JSX at runtime.
  -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- stage.jsx must load before app.jsx (exports window.WrapStage) -->
  <script type="text/babel" src="/wrap-studio/stage.jsx"></script>
  <script type="text/babel" src="/wrap-studio/app.jsx"></script>
</body>
</html>
